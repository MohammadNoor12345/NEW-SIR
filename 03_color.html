<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/Web-icon" href="internet.png">
    <title>Document</title>
    <style>
        h1 {
            color: red; /* This is a named color */
            color: #ff0000; /* This is a hexadecimal color */
            color: rgb(255, 0, 0); /* This is an RGB color */
            color: rgba(255, 0, 0, 1); /* This is an RGBA color */
            background-color: lightgray;
        }

        h2 {
            color: orange; /* This is a named color */
            color: #ffa500; /* This is a hexadecimal color */
            color: rgb(255, 165, 0); /* This is an RGB color */
            color: rgba(255, 165, 0, 1); /* This is an RGBA color */
            background-color: lightslategrey;
        }

        h3 {
            color: yellow; /* This is a named color */
            color: #ffff00; /* This is a hexadecimal color */
            color: rgb(255, 255, 0); /* This is an RGB color */
            color: rgba(255, 255, 0, 1); /* This is an RGBA color */
            background-color: lightblue;
        }

        h4 {
            color: green; /* This is a named color */
            color: #008000; /* This is a hexadecimal color */
            color: rgb(0, 128, 0); /* This is an RGB color */
            color: rgba(0, 128, 0, 1); /* This is an RGBA color */
            background-color: lightgreen;
        }

        h5 {
            color: blue;    /* This is a named color */
            color: #0000ff; /* This is a hexadecimal color */
            color: rgb(0, 0, 255); /* This is an RGB color */
            color: rgba(0, 0, 255, 1); /* This is an RGBA color */
            background-color: lightcoral;
        }

        h6 {
            color: purple; /* This is a named color */
            color: #800080; /* This is a hexadecimal color */
            color: rgb(128, 0, 128); /* This is an RGB color */
            color: rgba(128, 0, 128, 1); /* This is an RGBA color */
            background-color: lightpink;
        }

        #div2 {
            height: 1500px;
            width: 2000px;
            /* background-color: black; */
            background-image: url(Dog.png); /* for css we use url(../) to specify the path */
            /* background-repeat: no-repeat;*/ /* This prevents the image from repeating */
            /* background-repeat: repeat-x;*/ /* This repeats the image horizontally */
            background-repeat: repeat-y; /* This repeats the image vertically */
        }
        
    </style>
</head>
<body>
    <div>
        <h1>Heading 1</h1>
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
        <h4>Heading 4</h4>
        <h5>Heading 5</h5>
        <h6>Heading 6</h6>
    </div>
    <div id="div2">
        
    </div>
</body>
</html>
