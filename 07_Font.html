<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Properties</title>

    <style>
        body {
            background-color: #f5f5f5;
            padding: 40px;
        }

        .box {
            width: 600px;
            padding: 20px;
            border: 2px solid black;
            background: white;
        }

        .text {
            /* 1. Font Family */
            font-family: Arial, Helvetica, sans-serif;

            /* 2. Font Size */
            font-size: 24px;

            /* 3. Font Weight */
            font-weight: bold;
            /* normal, bold, 100–900 */

            /* 4. Font Style */
            font-style: italic;
            /* normal, italic */

            /* 5. Font Variant */
            font-variant: small-caps;
            /* it is for creating small capital letters */


            /* 6. Line Height */
            line-height: 40px;

            /* 7. Font Stretch (less used) */
            font-stretch: expanded;

            /* 8. Shorthand (overrides above if used) */
            /* font: italic small-caps bold 24px/40px Arial; */
        }
    </style>
</head>

<body>

    <div class="box">
        <p class="text">
            This text demonstrates all important CSS font properties.
            Inspect and change values to understand clearly.
        </p>
    </div>

</body>

</html>
