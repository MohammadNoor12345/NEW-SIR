<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Inspect Demo</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            padding: 40px;
        }

        /* Main box */
        .box {
            width: 300px;
            height: 300px;

            /* Content color */
            background-color: lightblue;

            /* Padding (inside space) */
            padding: 40px;

            /* Border */
            border: 10px solid black;

            /* Margin (outside space) */
            margin: 50px;

            /* Text just to see content area */
            font-size: 20px;
            font-weight: bold;
        }

        /* Inner content to visualize */
        .inner {
            background-color: yellow;
            height: 100%;
        }
    
        /* content box : 300px + 40px + 40px + 10px + 10px (content width; padding left and right; border left and right) */

    </style>
</head>

<body>

    <div class="box">
        <div class="inner">CONTENT</div>
    </div>

</body>

</html>
