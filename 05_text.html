<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Properties</title>

    <style>
        body {
            background-color: #f5f5f5;
            padding: 40px;
            font-family: Arial, sans-serif;
        }

        .box {
            width: 500px;
            padding: 20px;
            border: 2px solid black;
            background-color: white;
        }

        .text {
            color: blue;
            
            font-size: 20px;
            
            font-weight: bold;
           
            font-style: italic;
            
            text-align: center;
            
            text-decoration: underline;
           
            text-transform: uppercase;
            
            letter-spacing: 2px;
            
            word-spacing: 5px;
            
            line-height: 30px;
            
        }
    </style>
</head>

<body>

    <div class="box">
        <p class="text">
            This is a sample text to understand CSS text properties using inspect tool.
        </p>
    </div>

</body>

</html>
