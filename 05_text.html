<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Text Properties</title>

    <style>
        body {
            background-color: #f5f5f5;
            padding: 40px;
            font-family: Arial, sans-serif;
        }

        .box {
            width: 600px;
            padding: 20px;
            border: 2px solid black;
            background-color: white;
        }

        .text {
            /* 1. Color */
            color: darkblue;

            /* 2. Font Properties */
            font-family: Arial, Helvetica, sans-serif;
            font-size: 22px;
            font-weight: bold;
            font-style: italic;
            font-variant: small-caps;

            /* 3. Text Alignment */
            text-align: center;

            /* 4. Text Decoration */

            /* text-decoration-line: underline;
            text-decoration-color: red;
            text-decoration-style: solid;
            text-decoration-thickness: 2px; */
            text-decoration: underline red solid 2px;

            /* 5. Text Transform */
            text-transform: uppercase;

            /* 6. Spacing */
            letter-spacing: 3px;
            word-spacing: 8px;
            line-height: 35px;

            /* 7. Text Shadow */
            text-shadow: 2px 2px 5px greenyellow;
            /*
Format:
text-shadow: horizontal-offset vertical-offset blur-radius color;

2px → horizontal offset (X-axis)
+ value → shadow moves RIGHT
- value → shadow moves LEFT

2px → vertical offset (Y-axis)
+ value → shadow moves DOWN
- value → shadow moves UP

5px → blur radius
0 → sharp shadow
higher value → more blur (soft shadow)

greenyellow → shadow color
*/
            /* 8. Text Indent */
            text-indent: 50px;

            /* 9. White Space Control */
            white-space: normal;

            /* 10. Overflow Handling */
            overflow: hidden;

            /* 11. Direction */
            direction: ltr;

            /* 12. Writing Mode */
            writing-mode: horizontal-tb;
        }
    </style>
</head>

<body>

    <div class="box">
        <p class="text">
            This is a sample text to understand CSS text properties using inspect tool.
        </p>
    </div>

</body>

</html>
