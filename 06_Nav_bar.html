<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrolling Navbars</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

        }

        .section {
            height: 600px;
            padding-top: 10px;

        }

        .navbar {
            position: sticky;
            top: 0;
            padding: 15px;
            color: white;
            font-weight: bold;

        }

        .nav1 {
            background: blue;
        }

        .nav2 {
            background: green;
        }

        .nav3 {
            background: red;
        }

       /* for the sections as parent  */
        .s1 {
            background: lightblue;
        }

        .s2 {
            background: lightgreen;
        }

        .s3 {
            background: lightcoral;
        }
    </style>
</head>

<body>

    <!-- Section 1 -->
    <div class="section s1">
        <div class="navbar nav1">Navbar 1</div>
        <p>Scroll down...</p>
    </div>

    <!-- Section 2 -->
    <div class="section s2">
        <div class="navbar nav2">Navbar 2</div>
        <p>Scroll down...</p>
    </div>

    <!-- Section 3 -->
    <div class="section s3">
        <div class="navbar nav3">Navbar 3</div>
        <p>Scroll down...</p>
    </div>

</body>

</html>
