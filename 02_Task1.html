<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .para1 {
            color: black;
            background-color: lightblue;
            font-size: 20px;
            font-weight: bold;
        }
        div > p {
            color: blue;
            background-color: orange;
            font-size: 18px;
        }
        #first {
            color: red;
            background-color: yellow;
            font-size: 22px;
        }
    </style>
</head>
<body>
    <p class="para1">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Inventore, tenetur!</p>
    <p class="para1">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Inventore, tenetur!</p>

    <div>
        <p id="first">This is a paragraph inside a div.</p>
        <p>This is another paragraph inside the same div.</p>
    </div>
</body>
</html>
